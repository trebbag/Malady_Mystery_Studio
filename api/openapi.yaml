openapi: 3.1.0
info:
  title: Disease Comic Platform API
  version: 0.1.0
  description: >
    Starter API contract for the Disease-to-Comic Clinical Mystery Platform.
servers:
  - url: https://api.example.com
    description: Placeholder production URL
paths:
  /api/v1/projects:
    post:
      summary: Create a project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../contracts/disease-intake-request.schema.json'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '../contracts/project.schema.json'
  /api/v1/projects/{projectId}:
    get:
      summary: Get a project
      operationId: getProject
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '../contracts/project.schema.json'
  /api/v1/workflow-runs:
    post:
      summary: Start a workflow run
      operationId: startWorkflowRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [projectId]
              properties:
                projectId:
                  type: string
                diseaseName:
                  type: string
                audienceTier:
                  type: string
                lengthProfile:
                  type: string
                qualityProfile:
                  type: string
                styleProfile:
                  type: string
      responses:
        '202':
          description: Workflow accepted
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-run.schema.json'
  /api/v1/workflow-runs/{runId}:
    get:
      summary: Get a workflow run
      operationId: getWorkflowRun
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workflow run
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-run.schema.json'
  /api/v1/workflow-runs/{runId}/approvals:
    post:
      summary: Submit an approval decision
      operationId: submitApproval
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [role, decision]
              properties:
                role:
                  type: string
                reviewerId:
                  type: string
                decision:
                  type: string
                  enum: [approved, rejected]
                comment:
                  type: string
      responses:
        '200':
          description: Updated workflow run
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-run.schema.json'
  /api/v1/workflow-runs/{runId}/canonicalization-resolution:
    post:
      summary: Resolve an ambiguous or unresolved canonical disease
      operationId: resolveCanonicalization
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [selectedCanonicalDiseaseName, reason]
              properties:
                selectedCanonicalDiseaseName:
                  type: string
                reason:
                  type: string
      responses:
        '200':
          description: Updated workflow run
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-run.schema.json'
  /api/v1/workflow-runs/{runId}/events:
    post:
      summary: Apply a workflow event
      operationId: applyWorkflowEvent
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [eventType, actor]
              properties:
                eventType:
                  type: string
                  enum:
                    - START_RUN
                    - STAGE_PASSED
                    - STAGE_FAILED
                    - RECORD_APPROVAL
                    - APPROVALS_COMPLETED
                    - REJECT_TO_STAGE
                    - START_EXPORT
                    - EXPORT_COMPLETED
                    - RETRY_STAGE
                    - CANCEL_RUN
                    - REOPEN_REVIEW
                actor:
                  type: object
                  additionalProperties: false
                  required: [type, id]
                  properties:
                    type:
                      type: string
                      enum: [system, user]
                    id:
                      type: string
                payload:
                  type: object
      responses:
        '200':
          description: Updated workflow run
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-run.schema.json'
  /api/v1/workflow-runs/{runId}/audit-log-entries:
    get:
      summary: List audit log entries for a workflow run
      operationId: listWorkflowRunAuditLogEntries
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../contracts/audit-log-entry.schema.json'
  /api/v1/artifacts/{artifactType}/{artifactId}:
    get:
      summary: Get a generated artifact
      operationId: getArtifact
      parameters:
        - in: path
          name: artifactType
          required: true
          schema:
            type: string
        - in: path
          name: artifactId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Artifact payload
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '../contracts/canonical-disease.schema.json'
                  - $ref: '../contracts/canonicalization-resolution.schema.json'
                  - $ref: '../contracts/disease-packet.schema.json'
                  - $ref: '../contracts/story-workbook.schema.json'
                  - $ref: '../contracts/story-memory.schema.json'
                  - $ref: '../contracts/narrative-review-trace.schema.json'
                  - $ref: '../contracts/scene-card.schema.json'
                  - $ref: '../contracts/panel-plan.schema.json'
                  - $ref: '../contracts/render-prompt.schema.json'
                  - $ref: '../contracts/lettering-map.schema.json'
                  - $ref: '../contracts/qa-report.schema.json'
  /api/v1/evidence-records/{claimId}:
    get:
      summary: Get an evidence record by claim id
      operationId: getEvidenceRecord
      parameters:
        - in: path
          name: claimId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evidence record
          content:
            application/json:
              schema:
                $ref: '../contracts/evidence-record.schema.json'
  /api/v1/source-records:
    get:
      summary: List governed source records for a canonical disease
      operationId: listSourceRecords
      parameters:
        - in: query
          name: canonicalDiseaseName
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Source governance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../contracts/source-record.schema.json'
  /api/v1/source-records/{sourceId}:
    get:
      summary: Get a governed source record
      operationId: getSourceRecord
      parameters:
        - in: path
          name: sourceId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Source governance record
          content:
            application/json:
              schema:
                $ref: '../contracts/source-record.schema.json'
  /api/v1/auth/login:
    post:
      summary: Create a local password-authenticated session
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [tenantSlug, email, password]
              properties:
                tenantSlug:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [actor, session]
                properties:
                  actor:
                    $ref: '../contracts/user-account.schema.json'
                  session:
                    $ref: '../contracts/auth-session.schema.json'
  /api/v1/auth/sso/exchange:
    post:
      summary: Exchange an OIDC assertion for a server-side session
      operationId: exchangeSsoAssertion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [idToken]
              properties:
                idToken:
                  type: string
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [actor, session]
                properties:
                  actor:
                    $ref: '../contracts/user-account.schema.json'
                  session:
                    $ref: '../contracts/auth-session.schema.json'
  /api/v1/auth/me:
    get:
      summary: Get the current authenticated actor
      operationId: getCurrentActor
      responses:
        '200':
          description: Current actor
          content:
            application/json:
              schema:
                $ref: '../contracts/user-account.schema.json'
  /api/v1/tenants/{tenantId}/users:
    get:
      summary: List users in a tenant
      operationId: listTenantUsers
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tenant users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../contracts/user-account.schema.json'
  /api/v1/tenants/{tenantId}/users/{userId}/roles:
    post:
      summary: Update a user's tenant role memberships
      operationId: updateTenantUserRoles
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [roles]
              properties:
                roles:
                  type: array
                  items:
                    type: string
  /api/v1/release-bundles/{releaseId}:
    get:
      summary: Get a release bundle
      operationId: getReleaseBundle
      parameters:
        - in: path
          name: releaseId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Release bundle
          content:
            application/json:
              schema:
                $ref: '../contracts/release-bundle.schema.json'
  /api/v1/release-bundles/{releaseId}/index:
    get:
      summary: Get the human-readable bundle index
      operationId: getReleaseBundleIndex
      parameters:
        - in: path
          name: releaseId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Release bundle index markdown
          content:
            text/markdown:
              schema:
                type: string
  /api/v1/release-bundles/{releaseId}/evidence-pack:
    get:
      summary: Get the structured source evidence pack for a release
      operationId: getReleaseEvidencePack
      parameters:
        - in: path
          name: releaseId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Source evidence pack
          content:
            application/json:
              schema:
                type: object
  /api/v1/workflow-runs/{runId}/exports:
    get:
      summary: List export history entries for a workflow run
      operationId: listWorkflowRunExports
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Export history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../contracts/export-history-entry.schema.json'
    post:
      summary: Assemble and persist a release bundle for an approved workflow run
      operationId: exportWorkflowRun
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                version:
                  type: string
                exportTargets:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Release bundle exported
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [workflowRun, releaseBundle, exportHistoryEntry]
                properties:
                  workflowRun:
                    $ref: '../contracts/workflow-run.schema.json'
                  releaseBundle:
                    $ref: '../contracts/release-bundle.schema.json'
                  exportHistoryEntry:
                    $ref: '../contracts/export-history-entry.schema.json'
