openapi: 3.1.0
info:
  title: Disease Comic Platform API
  version: 0.1.0
  description: >
    Local-open API contract for the Disease Comic Platform. This runtime is intended
    for local execution with SQLite metadata storage, filesystem object storage,
    and a default local operator actor instead of sign-in or account management.
servers:
  - url: http://127.0.0.1:3000
    description: Default local runtime
paths:
  /api/v1/projects:
    post:
      summary: Create a project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../contracts/disease-intake-request.schema.json'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '../contracts/project.schema.json'
  /api/v1/projects/{projectId}:
    get:
      summary: Get a project
      operationId: getProject
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '../contracts/project.schema.json'
  /api/v1/workflow-runs:
    post:
      summary: Start a workflow run
      operationId: startWorkflowRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [projectId]
              properties:
                projectId:
                  type: string
                diseaseName:
                  type: string
                audienceTier:
                  type: string
                lengthProfile:
                  type: string
                qualityProfile:
                  type: string
                styleProfile:
                  type: string
      responses:
        '202':
          description: Workflow accepted
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-run.schema.json'
  /api/v1/workflow-runs/{runId}:
    get:
      summary: Get a workflow run
      operationId: getWorkflowRun
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workflow run
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-run.schema.json'
  /api/v1/review-dashboard-view:
    get:
      summary: Get the frontend review dashboard read model
      operationId: getReviewDashboardView
      parameters:
        - in: query
          name: disease
          schema:
            type: string
        - in: query
          name: state
          schema:
            type: string
        - in: query
          name: stage
          schema:
            type: string
        - in: query
          name: assignee
          schema:
            type: string
        - in: query
          name: exportStatus
          schema:
            type: string
        - in: query
          name: evalStatus
          schema:
            type: string
        - in: query
          name: queueStatus
          schema:
            type: string
        - in: query
          name: workType
          schema:
            type: string
        - in: query
          name: sort
          schema:
            type: string
      responses:
        '200':
          description: Review dashboard view
          content:
            application/json:
              schema:
                $ref: '../contracts/review-dashboard-view.schema.json'
  /api/v1/review-queue:
    get:
      summary: Get the cross-run review and operations queue
      operationId: getReviewQueue
      parameters:
        - in: query
          name: workType
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: priority
          schema:
            type: string
        - in: query
          name: queueName
          schema:
            type: string
        - in: query
          name: assignee
          schema:
            type: string
      responses:
        '200':
          description: Review queue view
          content:
            application/json:
              schema:
                $ref: '../contracts/review-queue-view.schema.json'
  /api/v1/workflow-runs/{runId}/review-run-view:
    get:
      summary: Get the frontend review-run read model
      operationId: getReviewRunView
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Review run view
          content:
            application/json:
              schema:
                $ref: '../contracts/review-run-view.schema.json'
  /api/v1/workflow-runs/{runId}/comments:
    get:
      summary: List stored review comments for a workflow run
      operationId: listReviewComments
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Review comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../contracts/review-comment.schema.json'
    post:
      summary: Create or update a review comment
      operationId: upsertReviewComment
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                id:
                  type: string
                scopeType:
                  type: string
                  enum: [run, artifact]
                artifactType:
                  type: string
                artifactId:
                  type: string
                fieldPath:
                  type: string
                status:
                  type: string
                  enum: [open, resolved, note]
                severity:
                  type: string
                  enum: [info, warning, critical]
                body:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Updated review comment
          content:
            application/json:
              schema:
                $ref: '../contracts/review-comment.schema.json'
        '201':
          description: Created review comment
          content:
            application/json:
              schema:
                $ref: '../contracts/review-comment.schema.json'
  /api/v1/workflow-runs/{runId}/assignments:
    get:
      summary: List stored review assignments for a workflow run
      operationId: listReviewAssignments
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Review assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../contracts/review-assignment.schema.json'
    post:
      summary: Create or update a review assignment
      operationId: upsertReviewAssignment
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                id:
                  type: string
                reviewRole:
                  type: string
                assigneeId:
                  type: string
                assigneeDisplayName:
                  type: string
                assigneeRoles:
                  type: array
                  items:
                    type: string
                status:
                  type: string
                  enum: [queued, in-progress, completed, reassigned]
                dueAt:
                  type: string
                  format: date-time
                completedAt:
                  type: string
                  format: date-time
                notes:
                  type: string
      responses:
        '200':
          description: Updated review assignment
          content:
            application/json:
              schema:
                $ref: '../contracts/review-assignment.schema.json'
        '201':
          description: Created review assignment
          content:
            application/json:
              schema:
                $ref: '../contracts/review-assignment.schema.json'
  /api/v1/workflow-runs/{runId}/threads:
    get:
      summary: List threaded review discussions for a workflow run
      operationId: listReviewThreads
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Review threads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../contracts/review-thread.schema.json'
    post:
      summary: Create a review thread for a workflow run
      operationId: createReviewThread
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [title, scopeType]
              properties:
                title:
                  type: string
                scopeType:
                  type: string
                  enum: [run, stage, artifact, source, render-job]
                scopeId:
                  type: string
      responses:
        '201':
          description: Review thread created
          content:
            application/json:
              schema:
                $ref: '../contracts/review-thread.schema.json'
  /api/v1/review-threads/{threadId}/messages:
    get:
      summary: List messages for a threaded review discussion
      operationId: listReviewThreadMessages
      parameters:
        - in: path
          name: threadId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Review thread messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../contracts/review-message.schema.json'
    post:
      summary: Append a message to a review thread
      operationId: createReviewThreadMessage
      parameters:
        - in: path
          name: threadId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [body]
              properties:
                body:
                  type: string
                parentMessageId:
                  type: string
                mentions:
                  type: array
                  items:
                    type: string
                resolutionNote:
                  type: string
      responses:
        '201':
          description: Review thread message created
          content:
            application/json:
              schema:
                $ref: '../contracts/review-message.schema.json'
  /api/v1/work-items/{workItemId}:
    get:
      summary: Get a queue work item
      operationId: getWorkItem
      parameters:
        - in: path
          name: workItemId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Work item
          content:
            application/json:
              schema:
                $ref: '../contracts/work-item.schema.json'
    patch:
      summary: Update a queue work item
      operationId: updateWorkItem
      parameters:
        - in: path
          name: workItemId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                status:
                  type: string
                  enum: [queued, in-progress, completed, escalated, cancelled]
                priority:
                  type: string
                  enum: [low, medium, high, critical]
                notes:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Updated work item
          content:
            application/json:
              schema:
                $ref: '../contracts/work-item.schema.json'
  /api/v1/workflow-runs/{runId}/artifacts:
    get:
      summary: List workflow-run artifacts for frontend pages
      operationId: listWorkflowRunArtifacts
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
        - in: query
          name: artifactType
          description: >
            Optional repeatable or comma-separated artifact type filter.
          schema:
            type: string
        - in: query
          name: expand
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Workflow artifact list view
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-artifact-list-view.schema.json'
  /api/v1/workflow-runs/{runId}/artifact-diffs:
    get:
      summary: Compare two stored artifact versions for a workflow run
      operationId: getWorkflowArtifactDiff
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
        - in: query
          name: artifactType
          required: true
          schema:
            type: string
        - in: query
          name: leftArtifactId
          schema:
            type: string
        - in: query
          name: rightArtifactId
          schema:
            type: string
      responses:
        '200':
          description: Artifact diff view
          content:
            application/json:
              schema:
                $ref: '../contracts/artifact-diff-view.schema.json'
  /api/v1/local-runtime-view:
    get:
      summary: Get the local runtime read model for the settings page
      operationId: getLocalRuntimeView
      responses:
        '200':
          description: Local runtime view
          content:
            application/json:
              schema:
                $ref: '../contracts/local-runtime-view.schema.json'
  /api/v1/workflow-runs/{runId}/approvals:
    post:
      summary: Submit an approval decision
      operationId: submitApproval
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [role, decision]
              properties:
                role:
                  type: string
                decision:
                  type: string
                  enum: [approved, rejected]
                comment:
                  type: string
      responses:
        '200':
          description: Updated workflow run
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-run.schema.json'
  /api/v1/workflow-runs/{runId}/canonicalization-resolution:
    post:
      summary: Resolve an ambiguous or unresolved canonical disease
      operationId: resolveCanonicalization
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [selectedCanonicalDiseaseName, reason]
              properties:
                selectedCanonicalDiseaseName:
                  type: string
                reason:
                  type: string
      responses:
        '200':
          description: Updated workflow run
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-run.schema.json'
  /api/v1/workflow-runs/{runId}/events:
    post:
      summary: Apply a workflow event
      operationId: applyWorkflowEvent
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [eventType, actor]
              properties:
                eventType:
                  type: string
                  enum:
                    - START_RUN
                    - STAGE_PASSED
                    - STAGE_FAILED
                    - REQUEST_REVIEW
                    - RECORD_APPROVAL
                    - APPROVALS_COMPLETED
                    - REJECT_TO_STAGE
                    - RESUME_STAGE
                    - START_EXPORT
                    - EXPORT_COMPLETED
                    - RETRY_STAGE
                    - CANCEL_RUN
                    - REOPEN_REVIEW
                actor:
                  type: object
                  additionalProperties: false
                  required: [type, id]
                  properties:
                    type:
                      type: string
                      enum: [system, user]
                    id:
                      type: string
                payload:
                  type: object
      responses:
        '200':
          description: Updated workflow run
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-run.schema.json'
  /api/v1/workflow-runs/{runId}/audit-log-entries:
    get:
      summary: List audit log entries for a workflow run
      operationId: listWorkflowRunAuditLogEntries
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../contracts/audit-log-entry.schema.json'
  /api/v1/workflow-runs/{runId}/clinical-package:
    get:
      summary: Get the assembled clinical package for a workflow run
      operationId: getWorkflowRunClinicalPackage
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Clinical package view
          content:
            application/json:
              schema:
                $ref: '../contracts/clinical-package-view.schema.json'
  /api/v1/workflow-runs/{runId}/clinical-package/rebuild:
    post:
      summary: Rebuild clinical artifacts and invalidate downstream story artifacts
      operationId: rebuildWorkflowRunClinicalPackage
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Workflow run after clinical package rebuild
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-run.schema.json'
  /api/v1/workflow-runs/{runId}/evaluations:
    get:
      summary: List evaluations for a workflow run
      operationId: listWorkflowRunEvaluations
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Eval runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../contracts/eval-run.schema.json'
    post:
      summary: Run deterministic local evaluations for a workflow run
      operationId: runWorkflowEvaluations
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Eval run recorded
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [workflowRun, evaluation]
                properties:
                  workflowRun:
                    $ref: '../contracts/workflow-run.schema.json'
                  evaluation:
                    $ref: '../contracts/eval-run.schema.json'
  /api/v1/evaluations/{evalRunId}:
    get:
      summary: Get an evaluation run
      operationId: getEvaluationRun
      parameters:
        - in: path
          name: evalRunId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evaluation run
          content:
            application/json:
              schema:
                $ref: '../contracts/eval-run.schema.json'
  /api/v1/workflow-runs/{runId}/render-jobs:
    post:
      summary: Queue a render job for a workflow run
      operationId: createRenderJob
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                renderPromptIds:
                  type: array
                  items:
                    type: string
      responses:
        '202':
          description: Render job queued
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [workflowRun, renderJob]
                properties:
                  workflowRun:
                    $ref: '../contracts/workflow-run.schema.json'
                  renderJob:
                    $ref: '../contracts/render-job.schema.json'
  /api/v1/render-jobs/{jobId}:
    get:
      summary: Get a render job with attempts and rendered assets
      operationId: getRenderJob
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Render job detail
          content:
            application/json:
              schema:
                $ref: '../contracts/render-job.schema.json'
  /api/v1/render-jobs/{jobId}/retry:
    post:
      summary: Queue a retry render job using the prior prompt set
      operationId: retryRenderJob
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Retry render job queued
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [workflowRun, renderJob]
                properties:
                  workflowRun:
                    $ref: '../contracts/workflow-run.schema.json'
                  renderJob:
                    $ref: '../contracts/render-job.schema.json'
  /api/v1/artifacts/{artifactType}/{artifactId}:
    get:
      summary: Get a generated artifact
      operationId: getArtifact
      parameters:
        - in: path
          name: artifactType
          required: true
          schema:
            type: string
        - in: path
          name: artifactId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Artifact payload
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '../contracts/canonical-disease.schema.json'
                  - $ref: '../contracts/canonicalization-resolution.schema.json'
                  - $ref: '../contracts/disease-packet.schema.json'
                  - $ref: '../contracts/fact-table.schema.json'
                  - $ref: '../contracts/evidence-graph.schema.json'
                  - $ref: '../contracts/clinical-teaching-points.schema.json'
                  - $ref: '../contracts/visual-anchor-catalog.schema.json'
                  - $ref: '../contracts/story-workbook.schema.json'
                  - $ref: '../contracts/story-memory.schema.json'
                  - $ref: '../contracts/narrative-review-trace.schema.json'
                  - $ref: '../contracts/scene-card.schema.json'
                  - $ref: '../contracts/panel-plan.schema.json'
                  - $ref: '../contracts/render-prompt.schema.json'
                  - $ref: '../contracts/lettering-map.schema.json'
                  - $ref: '../contracts/qa-report.schema.json'
                  - $ref: '../contracts/eval-run.schema.json'
                  - $ref: '../contracts/release-bundle.schema.json'
                  - $ref: '../contracts/work-item.schema.json'
                  - $ref: '../contracts/review-thread.schema.json'
                  - $ref: '../contracts/review-message.schema.json'
                  - $ref: '../contracts/render-job.schema.json'
                  - $ref: '../contracts/render-attempt.schema.json'
                  - $ref: '../contracts/rendered-asset.schema.json'
                  - $ref: '../contracts/rendered-asset-manifest.schema.json'
                  - $ref: '../contracts/source-owner-assignment.schema.json'
                  - $ref: '../contracts/source-refresh-task.schema.json'
  /api/v1/evidence-records/{claimId}:
    get:
      summary: Get an evidence record by claim id
      operationId: getEvidenceRecord
      parameters:
        - in: path
          name: claimId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evidence record
          content:
            application/json:
              schema:
                $ref: '../contracts/evidence-record.schema.json'
  /api/v1/evidence-records/{claimId}/contradiction-resolutions:
    post:
      summary: Record a local contradiction resolution for an evidence claim
      operationId: recordContradictionResolution
      parameters:
        - in: path
          name: claimId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [canonicalDiseaseName, status]
              properties:
                canonicalDiseaseName:
                  type: string
                relatedClaimId:
                  type: string
                status:
                  type: string
                  enum: [open, monitor, blocking, resolved]
                reason:
                  type: string
      responses:
        '201':
          description: Contradiction resolution recorded
          content:
            application/json:
              schema:
                $ref: '../contracts/contradiction-resolution.schema.json'
  /api/v1/source-records:
    get:
      summary: List governed source records for a canonical disease
      operationId: listSourceRecords
      parameters:
        - in: query
          name: canonicalDiseaseName
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Source governance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../contracts/source-record.schema.json'
  /api/v1/source-records/{sourceId}:
    get:
      summary: Get a governed source record
      operationId: getSourceRecord
      parameters:
        - in: path
          name: sourceId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Source governance record
          content:
            application/json:
              schema:
                $ref: '../contracts/source-record.schema.json'
  /api/v1/source-records/{sourceId}/governance-decisions:
    post:
      summary: Record a local source governance decision
      operationId: recordSourceGovernanceDecision
      parameters:
        - in: path
          name: sourceId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [canonicalDiseaseName, decision]
              properties:
                canonicalDiseaseName:
                  type: string
                decision:
                  type: string
                  enum: [approved, conditional, suspended, refresh-review-date]
                reason:
