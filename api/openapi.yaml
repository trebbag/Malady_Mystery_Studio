openapi: 3.1.0
info:
  title: Disease Comic Platform API
  version: 0.1.0
  description: >
    Local-open API contract for the Disease Comic Platform. This runtime is intended
    for local execution with SQLite metadata storage, filesystem object storage,
    and a default local operator actor instead of sign-in or account management.
servers:
  - url: http://127.0.0.1:3000
    description: Default local runtime
paths:
  /api/v1/projects:
    post:
      summary: Create a project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../contracts/disease-intake-request.schema.json'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '../contracts/project.schema.json'
  /api/v1/projects/{projectId}:
    get:
      summary: Get a project
      operationId: getProject
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '../contracts/project.schema.json'
  /api/v1/workflow-runs:
    post:
      summary: Start a workflow run
      operationId: startWorkflowRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [projectId]
              properties:
                projectId:
                  type: string
                diseaseName:
                  type: string
                audienceTier:
                  type: string
                lengthProfile:
                  type: string
                qualityProfile:
                  type: string
                styleProfile:
                  type: string
      responses:
        '202':
          description: Workflow accepted
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-run.schema.json'
  /api/v1/workflow-runs/{runId}:
    get:
      summary: Get a workflow run
      operationId: getWorkflowRun
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workflow run
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-run.schema.json'
  /api/v1/review-dashboard-view:
    get:
      summary: Get the frontend review dashboard read model
      operationId: getReviewDashboardView
      parameters:
        - in: query
          name: disease
          schema:
            type: string
        - in: query
          name: state
          schema:
            type: string
        - in: query
          name: stage
          schema:
            type: string
        - in: query
          name: exportStatus
          schema:
            type: string
        - in: query
          name: evalStatus
          schema:
            type: string
        - in: query
          name: sort
          schema:
            type: string
      responses:
        '200':
          description: Review dashboard view
          content:
            application/json:
              schema:
                $ref: '../contracts/review-dashboard-view.schema.json'
  /api/v1/workflow-runs/{runId}/review-run-view:
    get:
      summary: Get the frontend review-run read model
      operationId: getReviewRunView
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Review run view
          content:
            application/json:
              schema:
                $ref: '../contracts/review-run-view.schema.json'
  /api/v1/workflow-runs/{runId}/artifacts:
    get:
      summary: List workflow-run artifacts for frontend pages
      operationId: listWorkflowRunArtifacts
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
        - in: query
          name: artifactType
          description: >
            Optional repeatable or comma-separated artifact type filter.
          schema:
            type: string
        - in: query
          name: expand
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Workflow artifact list view
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-artifact-list-view.schema.json'
  /api/v1/local-runtime-view:
    get:
      summary: Get the local runtime read model for the settings page
      operationId: getLocalRuntimeView
      responses:
        '200':
          description: Local runtime view
          content:
            application/json:
              schema:
                $ref: '../contracts/local-runtime-view.schema.json'
  /api/v1/workflow-runs/{runId}/approvals:
    post:
      summary: Submit an approval decision
      operationId: submitApproval
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [role, decision]
              properties:
                role:
                  type: string
                decision:
                  type: string
                  enum: [approved, rejected]
                comment:
                  type: string
      responses:
        '200':
          description: Updated workflow run
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-run.schema.json'
  /api/v1/workflow-runs/{runId}/canonicalization-resolution:
    post:
      summary: Resolve an ambiguous or unresolved canonical disease
      operationId: resolveCanonicalization
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [selectedCanonicalDiseaseName, reason]
              properties:
                selectedCanonicalDiseaseName:
                  type: string
                reason:
                  type: string
      responses:
        '200':
          description: Updated workflow run
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-run.schema.json'
  /api/v1/workflow-runs/{runId}/events:
    post:
      summary: Apply a workflow event
      operationId: applyWorkflowEvent
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [eventType, actor]
              properties:
                eventType:
                  type: string
                  enum:
                    - START_RUN
                    - STAGE_PASSED
                    - STAGE_FAILED
                    - REQUEST_REVIEW
                    - RECORD_APPROVAL
                    - APPROVALS_COMPLETED
                    - REJECT_TO_STAGE
                    - RESUME_STAGE
                    - START_EXPORT
                    - EXPORT_COMPLETED
                    - RETRY_STAGE
                    - CANCEL_RUN
                    - REOPEN_REVIEW
                actor:
                  type: object
                  additionalProperties: false
                  required: [type, id]
                  properties:
                    type:
                      type: string
                      enum: [system, user]
                    id:
                      type: string
                payload:
                  type: object
      responses:
        '200':
          description: Updated workflow run
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-run.schema.json'
  /api/v1/workflow-runs/{runId}/audit-log-entries:
    get:
      summary: List audit log entries for a workflow run
      operationId: listWorkflowRunAuditLogEntries
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../contracts/audit-log-entry.schema.json'
  /api/v1/workflow-runs/{runId}/clinical-package:
    get:
      summary: Get the assembled clinical package for a workflow run
      operationId: getWorkflowRunClinicalPackage
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Clinical package view
          content:
            application/json:
              schema:
                $ref: '../contracts/clinical-package-view.schema.json'
  /api/v1/workflow-runs/{runId}/clinical-package/rebuild:
    post:
      summary: Rebuild clinical artifacts and invalidate downstream story artifacts
      operationId: rebuildWorkflowRunClinicalPackage
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Workflow run after clinical package rebuild
          content:
            application/json:
              schema:
                $ref: '../contracts/workflow-run.schema.json'
  /api/v1/workflow-runs/{runId}/evaluations:
    get:
      summary: List evaluations for a workflow run
      operationId: listWorkflowRunEvaluations
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Eval runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../contracts/eval-run.schema.json'
    post:
      summary: Run deterministic local evaluations for a workflow run
      operationId: runWorkflowEvaluations
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Eval run recorded
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [workflowRun, evaluation]
                properties:
                  workflowRun:
                    $ref: '../contracts/workflow-run.schema.json'
                  evaluation:
                    $ref: '../contracts/eval-run.schema.json'
  /api/v1/evaluations/{evalRunId}:
    get:
      summary: Get an evaluation run
      operationId: getEvaluationRun
      parameters:
        - in: path
          name: evalRunId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evaluation run
          content:
            application/json:
              schema:
                $ref: '../contracts/eval-run.schema.json'
  /api/v1/artifacts/{artifactType}/{artifactId}:
    get:
      summary: Get a generated artifact
      operationId: getArtifact
      parameters:
        - in: path
          name: artifactType
          required: true
          schema:
            type: string
        - in: path
          name: artifactId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Artifact payload
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '../contracts/canonical-disease.schema.json'
                  - $ref: '../contracts/canonicalization-resolution.schema.json'
                  - $ref: '../contracts/disease-packet.schema.json'
                  - $ref: '../contracts/fact-table.schema.json'
                  - $ref: '../contracts/evidence-graph.schema.json'
                  - $ref: '../contracts/clinical-teaching-points.schema.json'
                  - $ref: '../contracts/visual-anchor-catalog.schema.json'
                  - $ref: '../contracts/story-workbook.schema.json'
                  - $ref: '../contracts/story-memory.schema.json'
                  - $ref: '../contracts/narrative-review-trace.schema.json'
                  - $ref: '../contracts/scene-card.schema.json'
                  - $ref: '../contracts/panel-plan.schema.json'
                  - $ref: '../contracts/render-prompt.schema.json'
                  - $ref: '../contracts/lettering-map.schema.json'
                  - $ref: '../contracts/qa-report.schema.json'
                  - $ref: '../contracts/eval-run.schema.json'
                  - $ref: '../contracts/release-bundle.schema.json'
  /api/v1/evidence-records/{claimId}:
    get:
      summary: Get an evidence record by claim id
      operationId: getEvidenceRecord
      parameters:
        - in: path
          name: claimId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evidence record
          content:
            application/json:
              schema:
                $ref: '../contracts/evidence-record.schema.json'
  /api/v1/evidence-records/{claimId}/contradiction-resolutions:
    post:
      summary: Record a local contradiction resolution for an evidence claim
      operationId: recordContradictionResolution
      parameters:
        - in: path
          name: claimId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [canonicalDiseaseName, status]
              properties:
                canonicalDiseaseName:
                  type: string
                relatedClaimId:
                  type: string
                status:
                  type: string
                  enum: [open, monitor, blocking, resolved]
                reason:
                  type: string
      responses:
        '201':
          description: Contradiction resolution recorded
          content:
            application/json:
              schema:
                $ref: '../contracts/contradiction-resolution.schema.json'
  /api/v1/source-records:
    get:
      summary: List governed source records for a canonical disease
      operationId: listSourceRecords
      parameters:
        - in: query
          name: canonicalDiseaseName
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Source governance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../contracts/source-record.schema.json'
  /api/v1/source-records/{sourceId}:
    get:
      summary: Get a governed source record
      operationId: getSourceRecord
      parameters:
        - in: path
          name: sourceId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Source governance record
          content:
            application/json:
              schema:
                $ref: '../contracts/source-record.schema.json'
  /api/v1/source-records/{sourceId}/governance-decisions:
    post:
      summary: Record a local source governance decision
      operationId: recordSourceGovernanceDecision
      parameters:
        - in: path
          name: sourceId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [canonicalDiseaseName, decision]
              properties:
                canonicalDiseaseName:
                  type: string
                decision:
                  type: string
                  enum: [approved, conditional, suspended, refresh-review-date]
                reason:
                  type: string
                notes:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Source governance decision recorded
          content:
            application/json:
              schema:
                $ref: '../contracts/source-governance-decision.schema.json'
  /api/v1/release-bundles/{releaseId}:
    get:
      summary: Get a release bundle
      operationId: getReleaseBundle
      parameters:
        - in: path
          name: releaseId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Release bundle
          content:
            application/json:
              schema:
                $ref: '../contracts/release-bundle.schema.json'
  /api/v1/release-bundles/{releaseId}/index:
    get:
      summary: Get the human-readable bundle index
      operationId: getReleaseBundleIndex
      parameters:
        - in: path
          name: releaseId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Release bundle index markdown
          content:
            text/markdown:
              schema:
                type: string
  /api/v1/release-bundles/{releaseId}/evidence-pack:
    get:
      summary: Get the structured source evidence pack for a release
      operationId: getReleaseEvidencePack
      parameters:
        - in: path
          name: releaseId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Source evidence pack
          content:
            application/json:
              schema:
                type: object
  /api/v1/workflow-runs/{runId}/exports:
    get:
      summary: List export history entries for a workflow run
      operationId: listWorkflowRunExports
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Export history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../contracts/export-history-entry.schema.json'
    post:
      summary: Assemble and persist a release bundle for an approved workflow run
      operationId: exportWorkflowRun
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                version:
                  type: string
                exportTargets:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Release bundle exported
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [workflowRun, releaseBundle, exportHistoryEntry]
                properties:
                  workflowRun:
                    $ref: '../contracts/workflow-run.schema.json'
                  releaseBundle:
                    $ref: '../contracts/release-bundle.schema.json'
                  exportHistoryEntry:
                    $ref: '../contracts/export-history-entry.schema.json'
